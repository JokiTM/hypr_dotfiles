decoration {
    rounding = 10
    dim_special = .5

    blur {
        enabled = true
        xray = true
        special = false
        ignore_opacity = true  # Allows opacity blurring
        new_optimizations = true
        popups = true
        input_methods = true
        size = 2
        passes = 3
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a1aaf)
    }
}
