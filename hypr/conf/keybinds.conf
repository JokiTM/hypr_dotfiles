binds{
    hide_special_on_workspace_change = true
}
bind = Super, 1, workspace, 1
bind = Super, 2, workspace, 2
bind = Super, 3, workspace, 3
bind = Super, 4, workspace, 4
bind = Super, 5, workspace, 5
bind = Super, 6, workspace, 6
bind = Super, 7, workspace, 7
bind = Super, 8, workspace, 8
bind = Super, 9, workspace, 9
bind = Super, 0, workspace, 10

# Workspaces – Fenster verschieben (Super+Shift + Zahl)
bind = Super+Shift, 1, movetoworkspacesilent, 1
bind = Super+Shift, 2, movetoworkspacesilent, 2
bind = Super+Shift, 3, movetoworkspacesilent, 3
bind = Super+Shift, 4, movetoworkspacesilent, 4
bind = Super+Shift, 5, movetoworkspacesilent, 5
bind = Super+Shift, 6, movetoworkspacesilent, 6
bind = Super+Shift, 7, movetoworkspacesilent, 7
bind = Super+Shift, 8, movetoworkspacesilent, 8
bind = Super+Shift, 9, movetoworkspacesilent, 9
bind = Super+Shift, 0, movetoworkspacesilent, 10

# Workspaces Gruppen – Fenster verschieben (Ctrl+Super+Shift + Zahl)
bind = Ctrl+Super+Shift, 1, movetoworkspace, 1
bind = Ctrl+Super+Shift, 2, movetoworkspace, 2
bind = Ctrl+Super+Shift, 3, movetoworkspace, 3
bind = Ctrl+Super+Shift, 4, movetoworkspace, 4
bind = Ctrl+Super+Shift, 5, movetoworkspace, 5
bind = Ctrl+Super+Shift, 6, movetoworkspace, 6
bind = Ctrl+Super+Shift, 7, movetoworkspace, 7
bind = Ctrl+Super+Shift, 8, movetoworkspace, 8
bind = Ctrl+Super+Shift, 9, movetoworkspace, 9
bind = Ctrl+Super+Shift, 0, movetoworkspace, 10

bind = SUPER,Tab,cyclenext, # change focus to another window

# workspace switch with mouse
bind = Super, mouse_down, workspace, -1
bind = Super, mouse_up, workspace, +1
binde = Super, Page_Up, workspace, -1
binde = Super, Page_Down, workspace, +1

# Fokus bewegen mit HJKL (vim-style)
bind = Super, H, movefocus, l
bind = Super, J, movefocus, d
bind = Super, K, movefocus, u
bind = Super, L, movefocus, r

# Fokus bewegen mit Pfeiltasten
bind = Super, left, movefocus, l
bind = Super, down, movefocus, d
bind = Super, up, movefocus, u
bind = Super, right, movefocus, r

# Fenster verschieben mit Shift+HJKL
bind = Super+Shift, H, movewindow, l
bind = Super+Shift, J, movewindow, d
bind = Super+Shift, K, movewindow, u
bind = Super+Shift, L, movewindow, r

# Audio

bind = Ctrl+Alt, V, exec, pkill wiremix || foot -T wiremix zsh -c '~/.config/hypr/scripts/dispatch.sh wiremix'
bind = , XF86PickupPhone, exec,  pkill bluetui || foot -T bluetui zsh -c '~/.config/hypr/scripts/dispatch.sh bluetui'

# hyprlang if ARTIX
bindle = , XF86AudioRaiseVolume, exec, pamixer -i 5 --allow-boost
bindle = , XF86AudioLowerVolume, exec, pamixer -d 5 --allow-boost
# hyprlang endif

bindl = , XF86AudioMicMute, exec, pamixer --default-source -m
bindl = , XF86AudioMute, exec, pamixer -t

bindl = , XF86AudioPlay, exec, ~/.config/waybar/scripts/media.sh
bindl = , XF86Favorites, exec, ~/.config/waybar/scripts/media.sh
bindl = Shift, XF86AudioPlay, exec, ~/.confir/waybar/scripts/media.sh
bind = Super, mouse:275, exec,  ~/.config/waybar/scripts/media.sh
bind = Super, mouse:276, exec,  ~/.config/waybar/scripts/media.sh
bind = Super+Shift, mouse:275, exec,  ~/.config/waybar/scripts/media.sh
bind = Super+Shift, mouse:276, exec,  ~/.config/waybar/scripts/media.sh
bindl = , XF86AudioNext, exec,  playerctl next
bindl = , XF86AudioPrev, exec,  playerctl previous

binde = Super+Shift, comma, exec, rmpc volume -5
binde = Super+Shift, period, exec, rmpc volume +5
binde = Mod5, comma, exec, rmpc volume -5
binde = Mod5, period, exec, rmpc volume +5
bind = Super+Shift, mouse_down, exec, playerctl -p mpd volume .05+
bind = Super+Shift, mouse_up, exec, playerctl -p mpd volume .05-  


# Fullscreen
bind = Super, F, fullscreen, 1
bind = Super+Alt, F, fullscreen, 0
bind = Super, Space, togglefloating
#bind = Super, Space, exec, bash -c "hyprctl dispatch togglefloating && hyprctl dispatch resizeactive exact 50% 50%"
bindm = Super, mouse:272, movewindow
bindm = Super, X, resizewindow
bindm = Super, mouse:273, resizewindow

# Blur
binde = Super, Plus, exec, ~/.config/hypr/scripts/opacity.sh inc
binde = Super, Minus, exec, ~/.config/hypr/scripts/opacity.sh dec

# Screen brightness
bindle = , XF86MonBrightnessUp, exec, brightnessctl s +5% && notify-send -r $(cat /tmp/notif) -p backlight $(brightnessctl -d intel_backlight | grep % | awk '{ print $4 }' | sed 's/(//' | sed 's/)//') > /tmp/notif
bindle = , XF86MonBrightnessDown, exec, brightnessctl s 5%- && notify-send -r $(cat /tmp/notif) -p backlight $(brightnessctl -d intel_backlight | grep % | awk '{ print $4 }' | sed 's/(//' | sed 's/)//') > /tmp/notif
# misc
binde = Super, Q, killactive, 
bind = Super+Alt, L, exec, loginctl lock-session

# Apps
bind = Super, Return, exec, foot
bind = Super, W, exec, librewolf
bind = Super, D, exec, pkill fuzzel || fuzzel
bind = Super, E, exec, foot zsh -c "~/.config/yazi/dispatch-yazi.sh"

# utils
bind = Super+Shift, S, exec, pkill slurp || slurp | grim -g - - | wl-copy
bind = Super+Shift, P, exec, /home/mathis/.local/bin/vpntoggle.sh
bind = Super, Period, exec, pkill fuzzel || ~/.config/hypr/scripts/emoji.sh both

# Exit hyprland
bind = Ctrl+Alt, Backspace, exec, uwsm stop

# Resize submap
bind = SUPER, R, submap, resize
submap = resize
binde = , H, resizeactive, -30 0
binde = , L, resizeactive, 30 0
binde = , K, resizeactive, 0 -30
binde = , J, resizeactive, 0 20
binde = , S, resizeactive, -30 -30
binde = , E, resizeactive, 30 30
binde = Super, H, resizeactive, -30 0
binde = Super, L, resizeactive, 30 0
binde = Super, K, resizeactive, 0 -30
binde = Super, J, resizeactive, 0 30
binde = Super, S, resizeactive, -30 -30
binde = Super, E, resizeactive, 30 30
binde = , Escape, submap, reset
binde = , Return, submap, reset
binde = SUPER, R, submap, reset
submap = reset
