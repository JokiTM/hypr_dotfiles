# Workspaces 1–5 auf DP-1 (rechts, Hauptmonitor)
workspace = 1, monitor:DP-3
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 5, monitor:DP-3

workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1


#Spezialworcspaces funzt nicht
#workspace = special:communication, monitor:DP-3

# ============================
# === Special Workspaces ===
# ============================

bind = Super, S, togglespecialworkspace, scrap
workspace = special:crap

bind = Super, M, togglespecialworkspace, music
workspace = special:music, on-created-empty:strawberry

bind = Super, O, togglespecialworkspace, obs
workspace = special:obs, gapsin:50, gapsout:50, on-created-empty:obs

bind = Super, T, togglespecialworkspace, thunderbird
workspace = special:thunderbird, on-created-empty:thunderbird

bind = Super, P, togglespecialworkspace, piracy
workspace = special:piracy, on-created-empty:qbittorrent && nicotine

bind = Ctrl+Shift, Escape, togglespecialworkspace, sysmon
workspace = special:sysmon, on-created-empty:foot fish -C btop
