[mgr]
linemode = "size"

[preview]
cache_dir = "~/.cache/yazi"
max_width = 1920
max_height = 1080
quality = 100
preload = true

[[preview.preloaders]]
mime = "image/*"
exec = "chafa --size=${YAZI_PREVIEW_COLUMNS}x${YAZI_PREVIEW_LINES} $FILE"

[opener]
  video = [
    # For nightly yazi
    { run = "ya emit escape select && ya emit visual_mode && ya emit plugin simple-tag 'add-tag --key=w' && ya emit escape select && mpv %s", orphan = true, desc = "mpv", for = "linux" },
    { run = "ya emit escape select && ya emit visual_mode && ya emit plugin simple-tag 'add-tag --key=w' && ya emit escape select && vlc %s", orphan = true, desc = "vlc", for = "linux" },
  ]
  audio = [
    { run = "mpv %s", desc = "mpv", for = "linux" },
    #{ run = "vlc %s", desc = "vlc", for = "linux" },
  ]
  image = [
    { run = "mpv %s", desc = "mpv", for = "linux" },
    { run = "~/.config/hypr/scripts/wal.sh %s", desc = "Set Wall", for = "linux" },
    #{ run = "vlc %s", desc = "vlc", for = "linux" },
  ]

[open]
  prepend_rules = [
    # Video
    { mime = "video/*", use = [ "video" ] },
    { mime = "audio/*", use = [ "audio" ] },
    { mime = "image/*", use = [ "image" ] },
  ]

[file_list]
show_tags = true

[plugin]
  append_fetchers = [
    { id = "simple-tag", url = "*", run = "simple-tag" },
    { id = "simple-tag", url = "*/", run = "simple-tag" },
  ]
